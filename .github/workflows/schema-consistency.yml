name: Schema Consistency

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  validate-consistency:
    name: Validate Schema Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check domain naming consistency
        run: |
          echo "=== Checking domain naming consistency ==="
          ERRORS=0

          # Check MVP uses full domain names
          if ! grep -q "## Corporation Production State Domain" docs/nea_mvp_v1.md; then
            echo "❌ MVP v1 should use 'Corporation Production State Domain' not 'Corporation Domain'"
            ERRORS=$((ERRORS + 1))
          else
            echo "✓ Corporation domain naming correct"
          fi

          if ! grep -q "## Operational Telemetry Domain" docs/nea_mvp_v1.md; then
            echo "❌ MVP v1 should use 'Operational Telemetry Domain'"
            ERRORS=$((ERRORS + 1))
          else
            echo "✓ Operational domain naming correct"
          fi

          if [ $ERRORS -gt 0 ]; then
            exit 1
          fi

      - name: Check schema links exist
        run: |
          echo "=== Checking schema links in MVP v1 ==="
          ERRORS=0

          # Extract markdown links from MVP doc and check if files exist
          grep -oP '\]\(schema/\K[^)]+' docs/nea_mvp_v1.md | while read -r link; do
            if [ ! -f "docs/schema/$link" ]; then
              echo "❌ Broken link in MVP v1: schema/$link"
              ERRORS=$((ERRORS + 1))
            else
              echo "✓ Link valid: schema/$link"
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            exit 1
          fi

      - name: Check schema version tags
        run: |
          echo "=== Checking schema version consistency ==="

          # Extract all schema versions
          echo "Schema versions found:"
          grep -h "Schema Version:" docs/schema/*.md | sort -u

          # Count unique versions
          VERSION_COUNT=$(grep -h "Schema Version:" docs/schema/*.md | sort -u | wc -l)

          if [ "$VERSION_COUNT" -ne 1 ]; then
            echo "❌ Multiple schema versions found - all schemas should use the same version"
            exit 1
          else
            echo "✓ All schemas use consistent version tag"
          fi

      - name: Check filename matches document title
        run: |
          echo "=== Checking filename/title consistency ==="
          ERRORS=0

          # Check reference_domain.md contains "Reference Domain"
          if ! grep -q "Reference Domain" docs/schema/reference_domain.md | head -5; then
            echo "❌ reference_domain.md should contain 'Reference Domain' in title"
            ERRORS=$((ERRORS + 1))
          else
            echo "✓ reference_domain.md title matches filename"
          fi

          # Check corporation_domain.md contains "Corporation Production State Domain"
          if ! grep -q "Corporation Production State Domain" docs/schema/corporation_domain.md | head -5; then
            echo "❌ corporation_domain.md should contain 'Corporation Production State Domain' in title"
            ERRORS=$((ERRORS + 1))
          else
            echo "✓ corporation_domain.md title matches filename"
          fi

          # Check market_domain.md contains "Market"
          if ! grep -q "Market.*Domain" docs/schema/market_domain.md | head -5; then
            echo "❌ market_domain.md should contain 'Market' domain in title"
            ERRORS=$((ERRORS + 1))
          else
            echo "✓ market_domain.md title matches filename"
          fi

          # Check configuration_domain.md contains "Configuration"
          if ! grep -q "Configuration Domain" docs/schema/configuration_domain.md | head -5; then
            echo "❌ configuration_domain.md should contain 'Configuration Domain' in title"
            ERRORS=$((ERRORS + 1))
          else
            echo "✓ configuration_domain.md title matches filename"
          fi

          # Check operational_telemetry_domain.md contains "Operational Telemetry"
          if ! grep -q "Operational Telemetry Domain" docs/schema/operational_telemetry_domain.md | head -5; then
            echo "❌ operational_telemetry_domain.md should contain 'Operational Telemetry Domain' in title"
            ERRORS=$((ERRORS + 1))
          else
            echo "✓ operational_telemetry_domain.md title matches filename"
          fi

          if [ $ERRORS -gt 0 ]; then
            exit 1
          fi

      - name: Summary
        if: success()
        run: |
          echo ""
          echo "==================================="
          echo "✓ All schema consistency checks passed"
          echo "==================================="
